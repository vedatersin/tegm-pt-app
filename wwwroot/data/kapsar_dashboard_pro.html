
<!doctype html>
<html lang="tr">

  <title>Kapsar İlişkisi Dashboard — Kurumsal</title>
  <style>
    :root {
      --bg: #ffffff; --fg: #0f0f0f; --muted:#666; --bar:#f8f8f8; --border:#e0e0e0; --focus:#1f6feb;
    }
    [data-theme="dark"] { --bg:#0b0e14; --fg:#e7e7e7; --muted:#aaa; --bar:#121723; --border:#2a2f3a; --focus:#58a6ff; }
    [data-theme="hc"]   { --bg:#000; --fg:#fff; --muted:#ddd; --bar:#000; --border:#444; --focus:#ffea00; }

    html, body { height:100%; }
    body { font-family: system-ui, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background:var(--bg); color:var(--fg); }
    #topbar { display:flex; gap:12px; align-items:center; padding:12px; border-bottom:1px solid var(--border); background:var(--bar); position:sticky; top:0; z-index:5; }
    #network { width: 100vw; height: calc(100vh - 64px); }
    .chip { display:inline-flex; align-items:center; gap:6px; padding:4px 8px; border:1px solid var(--border); border-radius:12px; }
    .legend-color { width:12px; height:12px; border-radius:2px; display:inline-block; border:1px solid rgba(0,0,0,.2); }
    #search { padding:6px 10px; width: 280px; background:var(--bg); color:var(--fg); border:1px solid var(--border); border-radius:8px; }
    button, select { padding:6px 10px; border:1px solid var(--border); background:var(--bg); color:var(--fg); border-radius:8px; }
    button:focus, input:focus, select:focus { outline:3px solid var(--focus); outline-offset:1px; }
    #popup { position:fixed; right:16px; top:72px; width:380px; max-width:80vw; background:var(--bg); border:1px solid var(--border); box-shadow:0 4px 16px rgba(0,0,0,.12); border-radius:10px; padding:12px; display:none; z-index:10; }
    #popup h3 { margin:.2rem 0 .4rem; }
    #popup .meta { color:var(--muted); font-size:12px; margin-bottom:8px; }
    #popup .section-title { font-weight:600; margin-top:8px; }
    #popup ul { margin:.3rem 0 .6rem 1.2rem; max-height:180px; overflow:auto; }
    #closeBtn { position:absolute; right:8px; top:6px; cursor:pointer; font-size:18px; color:var(--muted); background:none; border:none; }
    #status { margin-left:auto; font-size:12px; color:var(--muted); }
  </style>
</head>

    const hcPalette = {"KB2": "#003a70", "KB3": "#005f73", "E1": "#b00020", "E2": "#4a148c", "E3": "#1b5e20"};

    const nodes = new vis.DataSet(JSON.parse(JSON.stringify(baseNodes)));
    const edges = new vis.DataSet(JSON.parse(JSON.stringify(baseEdges)));

    const container = document.getElementById('network');
    const data = { nodes, edges };
    const options = {
      autoResize: true,
      physics: { stabilization: true, barnesHut: { gravitationalConstant: -25000, springLength: 140, springConstant: 0.02 } },
      layout: { hierarchical: false, improvedLayout: true },
      interaction: { hover: true, multiselect: true, navigationButtons: true, selectable: true, keyboard: {bindToWindow: false} }
    };

    const network = new vis.Network(container, data, options);

    // Theme handling (also recolor borders in HC)
    const themeSel = document.getElementById('theme');
    function applyTheme(val) {
      document.documentElement.setAttribute('data-theme', val);
      if (val === 'hc') {
        nodes.forEach(n => {
          const g = n.group || '';
          const col = hcPalette[g] || '#ffffff';
          nodes.update({ id:n.id, color: { background: '#000000', border: col }, font: { color:'#ffffff' } });
        });
      } else {
        nodes.forEach((n, id) => {
          // revert to base
          const base = baseNodes.find(b=>b.id===n.id);
          if (base) nodes.update({ id:n.id, color: base.color, font: base.font });
        });
      }
    }
    themeSel.addEventListener('change', e => applyTheme(e.target.value));
    applyTheme('light');

    // Filters
    const activeGroups = new Set(["E1", "E2", "E3", "KB2", "KB3"]);
    function applyFilter() {
      nodes.forEach(n => {
        const grp = (n.group || '').toString();
        const show = grp ? activeGroups.has(grp) : true;
        nodes.update({ id: n.id, hidden: !show });
      });
      document.getElementById('status').textContent = `Gösterilen grup sayısı: ${activeGroups.size}`;
    }

    document.querySelectorAll('input[type=checkbox][data-group]').forEach(cb => {
      cb.addEventListener('change', e => {
        const g = e.target.getAttribute('data-group');
        if (e.target.checked) activeGroups.add(g); else activeGroups.delete(g);
        applyFilter();
      });
    });
    applyFilter();

    // Search & focus + suggestions
    const searchInput = document.getElementById('search');
    document.getElementById('btnFocus').onclick = () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) return;
      let targetId = null;
      nodes.forEach(n => {
        const label = (n.label || '').toLowerCase();
        const idStr = (n.id || '').toString().toLowerCase();
        if (!targetId && (label.includes(q) || idStr.includes(q))) targetId = n.id;
      });
      if (targetId) { network.selectNodes([targetId]); network.focus(targetId, { scale: 1.1, animation: true }); showPopup(targetId); }
    };

    document.getElementById('btnClear').onclick = () => {
      searchInput.value = '';
      network.unselectAll();
      network.fit({ animation: true });
      hidePopup();
    };

    // PNG export (captures <canvas> inside container)
    document.getElementById('btnExport').onclick = () => {
      const cvs = container.getElementsByTagName('canvas')[0];
      if (!cvs) return;
      const link = document.createElement('a');
      link.download = 'kapsar_dashboard.png';
      link.href = cvs.toDataURL('image/png');
      link.click();
    };

    // Keyboard shortcuts on network area
    container.setAttribute('tabindex','0');
    container.addEventListener('keydown', (e) => {
      const step = 80; // pan step
      if (e.key === '+') { network.moveTo({scale: network.getScale()*1.1}); }
      if (e.key === '-') { network.moveTo({scale: network.getScale()/1.1}); }
      if (e.key === 'ArrowUp')   { const p=network.getViewPosition(); network.moveTo({position:{x:p.x,y:p.y+step}}); }
      if (e.key === 'ArrowDown') { const p=network.getViewPosition(); network.moveTo({position:{x:p.x,y:p.y-step}}); }
      if (e.key === 'ArrowLeft') { const p=network.getViewPosition(); network.moveTo({position:{x:p.x+step,y:p.y}}); }
      if (e.key === 'ArrowRight'){ const p=network.getViewPosition(); network.moveTo({position:{x:p.x-step,y:p.y}}); }
    });

    // Popup logic
    const popup = document.getElementById('popup');
    const pTitle = document.getElementById('pTitle');
    const pMeta = document.getElementById('pMeta');
    const pChildren = document.getElementById('pChildren');
    const pParents = document.getElementById('pParents');
    document.getElementById('closeBtn').onclick = hidePopup;

    function hidePopup() { popup.style.display = 'none'; }
    function showPopup(id) {
      const n = nodes.get(id);
      if (!n) return;
      pTitle.textContent = (n.label || '').split('\n')[1] || n.id;
      pMeta.textContent = 'Kod: ' + n.id + (n.group ? '  •  Grup: ' + n.group : '');
      const outEdges = edges.get({ filter: e => e.from === id });
      pChildren.innerHTML = outEdges.map(e => {
        const child = nodes.get(e.to); const nm = (child && child.label) ? child.label.split('\n')[1] : e.to; return '<li>' + e.to + ' — ' + (nm || '') + '</li>';
      }).join('');
      const inEdges = edges.get({ filter: e => e.to === id });
      pParents.innerHTML = inEdges.map(e => {
        const parent = nodes.get(e.from); const nm = (parent && parent.label) ? parent.label.split('\n')[1] : e.from; return '<li>' + e.from + ' — ' + (nm || '') + '</li>';
      }).join('');
      popup.style.display = 'block';
    }

    network.on('click', params => {
      if (params.nodes.length) { showPopup(params.nodes[0]); } else { hidePopup(); }
    });

    network.on('doubleClick', params => {
      if (params.nodes.length) {
        const id = params.nodes[0];
        const connected = network.getConnectedNodes(id);
        network.selectNodes([id, ...connected]);
        network.fit({ nodes: [id, ...connected], animation: true });
        showPopup(id);
      }
    });
  </script>
